name: Generate artifact

on:
  workflow_dispatch:
        
jobs: 
  upload-artifact:
    name: "Upload artifact"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/upload-artifact@v4
        with:
          name: notification-position-gnome45
          path: src/gnome45/
      - uses: actions/upload-artifact@v4
        with:
          name: notification-position-legacy
          path: src/legacy/
